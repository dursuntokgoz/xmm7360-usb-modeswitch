name: Build OpenWrt Package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt.git
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add custom package
      run: |
        mkdir -p openwrt/package/custom
        cp -r . openwrt/package/custom/xmm7360-usb-modeswitch

    - name: Configure OpenWrt (Banana Pi R4)
      run: |
        cd openwrt
        make defconfig

        # Target ayarı
        sed -i 's/.*CONFIG_TARGET_.*/# &/' .config
        echo "CONFIG_TARGET_mediatek=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic_DEVICE_bananapi_bpi-r4=y" >> .config

        # Paket seçimi
        echo "CONFIG_PACKAGE_xmm7360-usb-modeswitch=y" >> .config

        make defconfig

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-packages
        path: openwrt/bin/
